<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Join SO You!</title>
    <meta
      name="description"
      content="Join a SO You! room from an invite link."
    >
    <link rel="icon" href="/assets/app-icon.png">
    <link rel="apple-touch-icon" href="/assets/app-icon.png">
    <link rel="stylesheet" href="/styles.css">
    <script src="/scripts/invite-links.js" defer></script>
    <script src="/join/join.js" defer></script>
  </head>
  <body class="invite-body">
    <header class="site-header invite-header">
      <a class="brand" href="/" aria-label="SO You! Support home">
        <img src="/assets/app-icon.png" alt="" width="44" height="44">
        <span>SO You!</span>
      </a>
      <nav aria-label="Invite links">
        <a href="/">Support</a>
        <a href="/privacy/">Privacy</a>
      </nav>
    </header>

    <main class="invite-page">
      <section class="invite-panel" aria-labelledby="invite-title">
        <div class="invite-brand-mark">
          <img src="/assets/app-icon.png" alt="" width="84" height="84">
        </div>

        <p class="eyebrow">Game Invite</p>
        <h1 id="invite-title">Join SO You!</h1>
        <p class="invite-copy" id="invite-copy">
          Open SO You! to join this room.
        </p>

        <div class="room-code-box" aria-live="polite">
          <span>Room code</span>
          <strong id="room-code">----</strong>
        </div>

        <div class="invite-actions">
          <a class="button primary" id="open-app" href="#" rel="nofollow">Open SO You</a>
          <button class="button secondary" id="copy-code" type="button">Copy room code</button>
        </div>

        <p class="invite-status" id="invite-status" role="status">
          Checking whether SO You! is installed...
        </p>

        <div class="install-options" id="install-options" aria-labelledby="install-title">
          <h2 id="install-title">Need the app?</h2>
          <div class="store-badges">
            <a class="store-badge app-store-badge" href="https://apps.apple.com/" rel="nofollow" aria-label="Open SO You on the App Store">
              <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                <path d="M16.9 12.8c0-2.2 1.8-3.3 1.9-3.4-1-1.5-2.6-1.7-3.2-1.7-1.4-.1-2.6.8-3.3.8-.7 0-1.8-.8-2.9-.8-1.5 0-2.9.9-3.7 2.2-1.6 2.8-.4 7 1.1 9.3.8 1.1 1.7 2.4 2.9 2.3 1.1 0 1.6-.7 2.9-.7 1.4 0 1.8.7 3 .7 1.3 0 2.1-1.1 2.8-2.3.9-1.3 1.2-2.5 1.2-2.6-.1 0-2.7-1-2.7-3.8ZM14.7 6.2c.6-.8 1.1-1.8.9-2.8-.9 0-2 .6-2.7 1.4-.6.7-1.1 1.8-1 2.8 1 .1 2.1-.6 2.8-1.4Z"/>
              </svg>
              <span>
                <small>Download on the</small>
                App Store
              </span>
            </a>
            <a class="store-badge play-store-badge" href="https://play.google.com/store/apps" rel="nofollow" aria-label="Open SO You on Google Play">
              <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                <path class="play-shape" d="M4.7 3.4c-.4.3-.7.8-.7 1.4v14.4c0 .6.3 1.1.7 1.4l8.5-8.6-8.5-8.6Z"/>
                <path class="play-shape" d="m14.3 10.9 2.3-2.3L6.4 2.8c-.4-.2-.8-.1-1.2.1l9.1 8Z"/>
                <path class="play-shape" d="m14.3 13.1-9.1 8c.4.2.8.3 1.2.1l10.2-5.8-2.3-2.3Z"/>
                <path class="play-shape" d="m19.5 10.2-1.7-1-2.5 2.8 2.5 2.8 1.7-1c1-.6 1-2.9 0-3.6Z"/>
              </svg>
              <span>
                <small>Get it on</small>
                Google Play
              </span>
            </a>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <span>SO You! Invite</span>
      <span>© 2026 SO You!</span>
    </footer>
  </body>
</html>
